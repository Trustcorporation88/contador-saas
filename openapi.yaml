          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Attachment'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===== COST CENTERS ENDPOINTS =====

  /companies/{id}/cost-centers:
    post:
      tags:
        - costcenters
      summary: Criar centro de custo
      description: Cria um novo centro de custo
      operationId: createCostCenter
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID da empresa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostCenter'
            examples:
              valid:
                summary: Centro de custo válido
                value:
                  code: "CC001"
                  name: "Centro de Custo Principal"
      responses:
        '201':
          description: Centro de custo criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostCenter'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - costcenters
      summary: Listar centros de custo
      description: Lista todos os centros de custo da empresa
      operationId: listCostCenters
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID da empresa
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        '200':
          description: Lista de centros de custo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CostCenter'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===== AUDIT LOGS ENDPOINTS =====

  /companies/{id}/audit-logs:
    get:
      tags:
        - audit
      summary: Listar logs de auditoria
      description: Lista logs de auditoria com filtros opcionais
      operationId: listAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID da empresa
        - name: action
          in: query
          schema:
            type: string
            enum: [create, read, update, delete, export]
          description: Filtrar por tipo de ação
        - name: entity_type
          in: query
          schema:
            type: string
          description: Filtrar por tipo de entidade
          example: "journal_entry"
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por usuário
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Data inicial
          example: "2026-05-01"
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Data final
          example: "2026-05-31"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
      responses:
        '200':
          description: Lista de logs de auditoria
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

security:
  - bearerAuth: []

