services:
  - type: web
    name: contador-backend-staging
    env: docker
    rootDir: backend
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: contador-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      # ── Admin bootstrap ───────────────────────────────────
      - key: ADMIN_BOOTSTRAP_EMAIL
        value: admin@procontador.com.br
      - key: ADMIN_BOOTSTRAP_PASSWORD
        value: ProContador@2026
      - key: ADMIN_BOOTSTRAP_FORCE_RESET
        value: 'true'

      # ── CORS ──────────────────────────────────────────────
      - key: CORS_ORIGIN
        value: https://contador-saas-ashy.vercel.app,https://procontador.com.br,https://www.procontador.com.br,http://localhost:5173

      # ── Rate limiting ─────────────────────────────────────
      - key: ENABLE_RATE_LIMITING
        value: 'true'
      - key: RATE_LIMIT_WINDOW_MS
        value: '60000'
      - key: RATE_LIMIT_MAX_REQUESTS
        value: '100'
      - key: RATE_LIMIT_MAX_LOGIN
        value: '5'

      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat

  - type: web
    name: contador-frontend-staging
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: contador-db
    plan: free
