# Backend API — ver railway.toml na RAIZ do repo (GitHub autodeploy)
# Root Directory no Railway = / (vazio). Não use backend/ como root (falta automacao-xml).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"